version: 2
updates:

  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
    schedule:
      interval: weekly
    groups:
      all:
        patterns:
        - "*"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "maven"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
    groups:
      all:
        patterns:
        - "*"
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "docker"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"

  - package-ecosystem: "github-actions"
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
    groups:
      all:
        patterns:
        - "*"
    commit-message:
      prefix: "ci(deps):"
