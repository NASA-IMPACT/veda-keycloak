name: Diff CDK Stack

on:
  pull_request:

permissions:
  id-token: write # Required for OIDC authentication w/ AWS
  contents: read

run-name: Diff ${{ github.ref }}

jobs:
  diff:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3.1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a #v4.3.1
        with:
          role-to-assume: ${{ vars.AWS_CDK_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActionsCDKDeploy
          role-duration-seconds: 3600

      - name: Set up Python 3.13
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c #v4.9.1
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv sync -p 3.13

      - name: Synthesize CDK
        run: uv run npx cdk synth
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          CDK_BOOTSTRAP_QUALIFIER: ${{ vars.CDK_BOOTSTRAP_QUALIFIER }}
          VPC_ID: ${{ vars.VPC_ID }}
          PERMISSIONS_BOUNDARY_ARN: ${{ vars.PERMISSIONS_BOUNDARY_ARN }}
          HOSTNAME: ${{ vars.HOSTNAME }}
          KEYCLOAK_VERSION: ${{ vars.KEYCLOAK_VERSION }}
          KEYCLOAK_CONFIG_CLI_VERSION: ${{ vars.KEYCLOAK_CONFIG_CLI_VERSION }}
          SSL_CERTIFICATE_ARN: ${{ vars.SSL_CERTIFICATE_ARN }}
          RDS_SNAPSHOT_IDENTIFIER: ${{ vars.RDS_SNAPSHOT_IDENTIFIER }}
          STAGE: dev
          CONFIGURE_ROUTE53: ${{ vars.CONFIGURE_ROUTE53 }}
          # Imported Identity Provider secrets
          IDP_SECRET_ARN_GH: ${{ vars.IDP_SECRET_ARN_GH }}
          IDP_SECRET_ARN_CILOGON: ${{ vars.IDP_SECRET_ARN_CILOGON }}
          IDP_SECRET_ARN_EDL: ${{ vars.IDP_SECRET_ARN_EDL }}
          KEYCLOAK_SEND_EMAIL_ADDRESS_VEDA: ${{ vars.KEYCLOAK_SEND_EMAIL_ADDRESS_VEDA }}
          KEYCLOAK_SEND_EMAIL_ADDRESS_MAAP: ${{ vars.KEYCLOAK_SEND_EMAIL_ADDRESS_MAAP }}
          APPLICATION_ROLE_ARN_AIRFLOW_INGEST_API_ETL: ${{ vars.APPLICATION_ROLE_ARN_AIRFLOW_INGEST_API_ETL }}
          APPLICATION_ROLE_ARN_DISASTERS_AIRFLOW_INGEST_API_ETL: ${{ vars.APPLICATION_ROLE_ARN_DISASTERS_AIRFLOW_INGEST_API_ETL }}
          APPLICATION_ROLE_ARN_EIC_AIRFLOW_INGEST_API_ETL: ${{ vars.APPLICATION_ROLE_ARN_EIC_AIRFLOW_INGEST_API_ETL }}
          APPLICATION_ROLE_ARN_EIC_UMA_RESOURCE_SERVER: ${{ vars.APPLICATION_ROLE_ARN_EIC_UMA_RESOURCE_SERVER }}
          APPLICATION_ROLE_ARN_GHGC_AIRFLOW_WEBSERVER_FAB: ${{ vars.APPLICATION_ROLE_ARN_GHGC_AIRFLOW_WEBSERVER_FAB }}
          APPLICATION_ROLE_ARN_GHGC_AIRFLOW_INGEST_API_ETL: ${{ vars.APPLICATION_ROLE_ARN_GHGC_AIRFLOW_INGEST_API_ETL }}
      - name: Diff CDK
        uses: corymhall/cdk-diff-action@ad67041313333f7f2bd26b33f18fb134610a971e # v2.0.9
        with:
          failOnDestructiveChanges: false
          githubToken: ${{ secrets.GITHUB_TOKEN }}
