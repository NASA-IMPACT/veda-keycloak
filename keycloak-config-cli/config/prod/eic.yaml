---
enabled: true
realm: eic
displayName: EIC
displayNameHtml: eic

clients:
  - clientId: eic-stac
    name: EIC STAC Catalog
    rootUrl: https://earth.gov/eic/api/stac
    publicClient: true
    attributes: {}
    redirectUris:
      - https://earth.gov/eic/api/stac*
      - https://eic-staging.staging.earth.gov/api/stac/*
    webOrigins:
      - https://earth.gov
      - https://eic-staging.staging.earth.gov
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete

  - clientId: eic-airflow-stac-etl
    name: EIC Airflow STAC ETL
    secret: $(env:EIC_AIRFLOW_STAC_ETL_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    protocol: openid-connect
    fullScopeAllowed: true
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    optionalClientScopes:
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    defaultClientScopes:
      - roles

  - clientId: eic-ingest-api
    name: EIC Ingest API
    rootUrl: https://earth.gov/eic/api/ingest
    publicClient: true
    attributes: {}
    redirectUris:
      - https://earth.gov/eic/api/ingest/*
      - https://eic-staging.staging.earth.gov/api/ingest/*
    webOrigins:
      - https://earth.gov
      - https://eic-staging.staging.earth.gov
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete

  - clientId: eic-airflow-ingest-api-etl
    name: EIC Airflow Ingest API ETL
    secret: $(env:EIC_AIRFLOW_INGEST_API_ETL_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    protocol: openid-connect
    fullScopeAllowed: true
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    optionalClientScopes:
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    defaultClientScopes:
      - roles

  - clientId: eic-ingest-ui
    name: Ingest UI
    rootUrl: https://ingest.eic.earth.gov/
    secret: $(env:EIC_INGEST_UI_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    redirectUris:
      - https://ingest.eic.earth.gov/*
    webOrigins:
      - https://ingest.eic.earth.gov
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - dataset:create
      - dataset:update
    protocolMappers:
      # Include user groups in JWT tokens
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "false"
          usermodel.clientRoleMapping.clientId: eic-ingest-ui
          usermodel.clientRoleMapping.rolePrefix: ""

  - clientId: eic-airflow-webserver-fab
    name: EIC Airflow Webserver FAB
    rootUrl: https://sm2a.eic.earth.gov
    publicClient: false
    secret: $(env:EIC_AIRFLOW_WEBSERVER_FAB_CLIENT_SECRET)
    attributes:
      realm_client: "false"
      oidc.ciba.grant.enabled: "false"
      backchannel.logout.session.required: "true"
      standard.token.exchange.enabled: "false"
      oauth2.device.authorization.grant.enabled: "false"
      backchannel.logout.revoke.offline.tokens: "false"
    redirectUris:
      - http://sm2a.eic.earth.gov/oauth-authorized/keycloak
      - http://sm2a.eic-staging.staging.earth.gov/oauth-authorized/keycloak
    webOrigins:
      - https://sm2a.eic.earth.gov
      - https://sm2a.eic-staging.staging.earth.gov
    protocol: openid-connect
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: true
    fullScopeAllowed: true
    frontchannelLogout: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email

  - clientId: eic-uma-resource-server
    name: Authorization Resource Server
    publicClient: false
    secret: $(env:EIC_UMA_RESOURCE_SERVER_CLIENT_SECRET)
    protocol: openid-connect
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    authorizationServicesEnabled: true
    protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"
    authorizationSettings:
      allowRemoteResourceManagement: true
      policyEnforcementMode: ENFORCING
      resources:
        - name: stac:collection:public:*
          type: "stac-collection"
          ownerManagedAccess: false
          uris:
            - "stac:collection:public:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:item:public:*
          type: "stac-item"
          ownerManagedAccess: false
          uris:
            - "stac:item:public:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:collection:ghgc:*
          type: "stac-collection"
          ownerManagedAccess: false
          uris:
            - "stac:collection:ghgc:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:item:ghgc:*
          type: "stac-item"
          ownerManagedAccess: false
          uris:
            - "stac:item:ghgc:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:collection:veda:*
          type: "stac-collection"
          ownerManagedAccess: false
          uris:
            - "stac:collection:veda:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:item:veda:*
          type: "stac-item"
          ownerManagedAccess: false
          uris:
            - "stac:item:veda:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:collection:water-insight:*
          type: "stac-collection"
          ownerManagedAccess: false
          uris:
            - "stac:collection:water-insight:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:item:water-insight:*
          type: "stac-item"
          ownerManagedAccess: false
          uris:
            - "stac:item:water-insight:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:collection:air-quality:*
          type: "stac-collection"
          ownerManagedAccess: false
          uris:
            - "stac:collection:air-quality:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
        - name: stac:item:air-quality:*
          type: "stac-item"
          ownerManagedAccess: false
          uris:
            - "stac:item:air-quality:*"
          scopes:
            - name: "create"
            - name: "update"
            - name: "delete"
            - name: "read"
      policies:
        - name: GHGC Editors
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/ghgc/Editors","extendChildren":false}]'
            groupsClaim: "groups"
        - name: GHGC Admins
          description: GHGC Admins Group Policy
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/ghgc/Admins","extendChildren":false}]'
            groupsClaim: "groups"
        - name: VEDA Editors
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/veda/Editors","extendChildren":false}]'
            groupsClaim: "groups"
        - name: VEDA Admins
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/veda/Admins","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Water Insight Editors
          description: Water Insight Editors Group Policy
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/water-insight/Editors","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Water Insight Admins
          description: Water Insight Admins Group Policy
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/water-insight/Admins","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Air Quality Editors
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/air-quality/Editors","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Air Quality Admins
          description: Air Quality Admins Group Policy
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Tenants/air-quality/Admins","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Developers
          description: Developers Group
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Developers","extendChildren":false}]'
            groupsClaim: "groups"
        - name: Data Editors
          description: Data Editors
          type: group
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            groups: '[{"path":"/Data Editors","extendChildren":false}]'
            groupsClaim: "groups"
        # Public Collections Permissions
        - name: Public Collections Permission - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:public:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Public Collections Permission - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:public:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Public Collections Permission - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:public:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Air Quality Admins", "Water Insight Admins","VEDA Admins", "GHGC Admins", "Developers"]'
        # Public Items Permissions
        - name: Public Items Permission - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:public:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Public Items Permission - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:public:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Public Items Permission - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:public:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Air Quality Admins", "Water Insight Admins","VEDA Admins","GHGC Admins","Developers"]'
        # GHGC - Collections Permissions
        - name: GHGC - Collections - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:ghgc:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["GHGC Editors","GHGC Admins"]'
        - name: GHGC - Collections - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:ghgc:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: GHGC - Collections - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:collection:ghgc:*"]'
            scopes: '["delete"]'
            applyPolicies: '["GHGC Admins"]'
        # GHGC - Items Permissions
        - name: GHGC - Items - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:ghgc:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["GHGC Editors","GHGC Admins"]'
        - name: GHGC - Items - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:ghgc:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: GHGC - Items - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:item:ghgc:*"]'
            scopes: '["delete"]'
            applyPolicies: '["GHGC Admins"]'
        # VEDA - Collections Permissions
        - name: VEDA - Collections - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:veda:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["VEDA Editors", "VEDA Admins"]'
        - name: VEDA - Collections - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:veda:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: VEDA - Collections - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:collection:veda:*"]'
            scopes: '["delete"]'
            applyPolicies: '["VEDA Admins"]'
        # VEDA - Items Permissions
        - name: VEDA - Items - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:veda:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["VEDA Admins","VEDA Editors"]'
        - name: VEDA - Items - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:veda:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: VEDA - Items - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:item:veda:*"]'
            scopes: '["delete"]'
            applyPolicies: '["VEDA Admins"]'
        # Water Insight - Collections Permissions
        - name: Water Insight - Collections - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:water-insight:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Water Insight Admins","Water Insight Editors"]'
        - name: Water Insight - Collections - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:water-insight:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Water Insight - Collections - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:collection:water-insight:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Water Insight Admins"]'
        # Water Insight - Items Permissions
        - name: Water Insight - Items - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:water-insight:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Water Insight Admins","Water Insight Editors"]'
        - name: Water Insight - Items - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:water-insight:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Water Insight - Items - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:item:water-insight:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Water Insight Admins"]'
        # Air Quality - Collections Permissions
        - name: Air Quality - Collections - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:air-quality:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Air Quality Admins","Air Quality Editors"]'
        - name: Air Quality - Collections - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:collection:air-quality:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Air Quality - Collections - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:collection:air-quality:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Air Quality Admins"]'
        # Air Quality - Items Permissions
        - name: Air Quality - Items - Create, Update
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:air-quality:*"]'
            scopes: '["create","update"]'
            applyPolicies: '["Air Quality Admins","Air Quality Editors"]'
        - name: Air Quality - Items - Read
          type: scope
          logic: POSITIVE
          decisionStrategy: AFFIRMATIVE
          config:
            resources: '["stac:item:air-quality:*"]'
            scopes: '["read"]'
            applyPolicies: '["Air Quality Admins", "Air Quality Editors", "Water Insight Admins", "Water Insight Editors", "VEDA Admins", "VEDA Editors", "GHGC Admins", "GHGC Editors", "Data Editors", "Developers"]'
        - name: Air Quality - Items - Delete
          type: scope
          logic: POSITIVE
          decisionStrategy: UNANIMOUS
          config:
            resources: '["stac:item:air-quality:*"]'
            scopes: '["delete"]'
            applyPolicies: '["Air Quality Admins"]'
      scopes:
        - name: create
        - name: update
        - name: delete
        - name: read
      decisionStrategy: UNANIMOUS

roles:
  client:
    eic-stac:
      - name: Admin
        description: Can create, update and delete STAC collections and items
      - name: Editor
        description: Can create and update STAC collections and items
      - name: Viewer
        description: Can only view STAC collections and items
    eic-ingest-api:
      - name: Admin
        description: Can create, update and delete STAC collections and items
      - name: Editor
        description: Can create and update STAC collections and items
      - name: No Basic Role
        description: Has no permissions
    eic-ingest-ui:
      - name: Editor
        description: Can initiate and update dataset ingests
    eic-airflow-webserver-fab:
      - name: Admin
        description: Has all possible permissions, including granting or revoking permissions from other users
      - name: Public
        description: No permissions
      - name: Viewer
        description: Limited read permissions
      - name: User
        description: Viewer permissions plus additional permissions
      - name: Dag_Launcher
        description: Programmatic DAG runs

clientScopeMappings:
  eic-stac:
    - clientScope: stac:item:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:delete
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:delete
      roles:
        - Admin
  eic-ingest-api:
    - clientScope: stac:item:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:delete
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:delete
      roles:
        - Admin
  eic-ingest-ui:
    - clientScope: dataset:create
      roles:
        - Editor
    - clientScope: dataset:update
      roles:
        - Editor

clientScopes:
  - name: stac:item:create
    description: Create STAC items
    protocol: openid-connect
  - name: stac:item:update
    description: Update STAC items
    protocol: openid-connect
  - name: stac:item:delete
    description: Delete STAC items
    protocol: openid-connect
  - name: stac:collection:create
    description: Create STAC collections
    protocol: openid-connect
  - name: stac:collection:update
    description: Update STAC collections
    protocol: openid-connect
