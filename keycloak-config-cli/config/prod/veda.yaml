---
enabled: true
realm: veda
displayName: Applications
displayNameHtml: VEDA Ecosystem

clients:
  - clientId: grafana
    name: Grafana
    rootUrl: https://monitoring.openveda.cloud
    secret: $(env:GRAFANA_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    redirectUris:
      - https://monitoring.openveda.cloud/*
    webOrigins:
      - https://monitoring.openveda.cloud
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
    protocolMappers:
      # We ensure that user's client roles are injected into the userinfo so that Grafana
      # can retrieve them via the `role_attribute_path` JMES expression.
      - name: client-roles-claim
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          access.token.claim: "false"
          lightweight.claim: "false"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"

          claim.name: roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: grafana # Filter-out non-Grafana roles
          usermodel.clientRoleMapping.rolePrefix: ""

  - clientId: stac
    name: STAC Catalog
    rootUrl: https://openveda.cloud
    publicClient: true
    attributes: {}
    redirectUris:
      - https://test.openveda.cloud/*
      - https://openveda.cloud/*
    webOrigins:
      - https://test.openveda.cloud
      - https://openveda.cloud
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    protocolMappers:
      # Include user groups in JWT tokens with full paths
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"
      - name: stac_roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: stac_roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: stac
          usermodel.clientRoleMapping.rolePrefix: ""
      - name: grafana_roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: grafana_roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: grafana
          usermodel.clientRoleMapping.rolePrefix: ""
      - name: ingest_roles
        protocol: openid-connect
        protocolMapper: oidc-usermodel-client-role-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: ingest_roles
          jsonType.label: String
          multivalued: "true"
          usermodel.clientRoleMapping.clientId: ingest-api
          usermodel.clientRoleMapping.rolePrefix: ""

  - clientId: airflow-stac-etl
    name: Airflow STAC ETL
    secret: $(env:AIRFLOW_STAC_ETL_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    protocol: openid-connect
    fullScopeAllowed: true
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    optionalClientScopes:
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    defaultClientScopes:
      - roles

  - clientId: ingest-api
    name: STAC Ingest API
    rootUrl: https://openveda.cloud
    publicClient: true
    attributes: {
      "access.token.lifespan": "3600",
    }
    redirectUris:
      - https://test.openveda.cloud/*
      - https://staging.openveda.cloud/*
      - https://openveda.cloud/*
    webOrigins:
      - https://test.openveda.cloud
      - https://staging.openveda.cloud
      - https://openveda.cloud
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    protocolMappers:
      # Include user groups in JWT tokens
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"
          usermodel.clientRoleMapping.clientId: ingest-api
          usermodel.clientRoleMapping.rolePrefix: ""

  - clientId: airflow-ingest-api-etl
    name: Airflow Ingest API ETL
    secret: $(env:AIRFLOW_INGEST_API_ETL_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    protocol: openid-connect
    fullScopeAllowed: true
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    optionalClientScopes:
      - stac:item:create
      - stac:item:update
      - stac:item:delete
      - stac:collection:create
      - stac:collection:update
      - stac:collection:delete
    defaultClientScopes:
      - roles

  - clientId: veda-airflow-token-exchange
    name: Airflow token exchange (RFC 8693)
    secret: $(env:VEDA_AIRFLOW_TOKEN_EXCHANGE_CLIENT_SECRET)
    publicClient: false
    attributes:
      standard.token.exchange.enabled: "true"
    protocol: openid-connect
    fullScopeAllowed: false
    standardFlowEnabled: false
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: true
    defaultClientScopes:
      - roles


  - clientId: ingest-ui
    name: Ingest UI
    rootUrl: https://ingest.openveda.cloud
    secret: $(env:INGEST_UI_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    redirectUris:
      - https://ingest.openveda.cloud/*
    webOrigins:
      - https://ingest.openveda.cloud
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
      - dataset:create
      - dataset:update
      - stac:collection:update
    protocolMappers:
      # Include user groups in JWT tokens
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          access.token.claim: "true"
          userinfo.token.claim: "true"
          id.token.claim: "true"
          introspection.token.claim: "true"
          claim.name: groups
          jsonType.label: String
          multivalued: "true"
          full.path: "true"
          usermodel.clientRoleMapping.clientId: ingest-ui
          usermodel.clientRoleMapping.rolePrefix: ""

  - clientId: discourse-forum
    name: Discourse
    rootUrl: https://community.openveda.cloud
    secret: $(env:DISCOURSE_FORUM_CLIENT_SECRET)
    publicClient: false
    attributes: {}
    redirectUris:
      - https://community.openveda.cloud/*
    webOrigins:
      - https://community.openveda.cloud
    protocol: openid-connect
    fullScopeAllowed: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email

  - clientId: airflow-webserver-fab
    name: Airflow Webserver FAB
    rootUrl: https://sm2a.openveda.cloud
    publicClient: false
    secret: $(env:AIRFLOW_WEBSERVER_FAB_CLIENT_SECRET)
    attributes:
      realm_client: "false"
      oidc.ciba.grant.enabled: "false"
      backchannel.logout.session.required: "true"
      standard.token.exchange.enabled: "false"
      oauth2.device.authorization.grant.enabled: "false"
      backchannel.logout.revoke.offline.tokens: "false"
    redirectUris:
      - http://sm2a.openveda.cloud/oauth-authorized/keycloak
    webOrigins:
      - https://sm2a.openveda.cloud
    protocol: openid-connect
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: true
    serviceAccountsEnabled: true
    fullScopeAllowed: true
    frontchannelLogout: true
    defaultClientScopes:
      - web-origins
      - acr
      - profile
      - roles
      - basic
      - email
    optionalClientScopes:
      - dataset:update
      - dataset:create

  - clientId: earth-gov-cms
    name: Earth.gov CMS
    rootUrl: https://pre.staging.earth.gov
    publicClient: false
    secret: $(env:EARTH_GOV_CMS_CLIENT_SECRET)
    attributes: {}
    redirectUris:
      - https://pre.staging.earth.gov/api/auth/callback/keycloak
      - https://pre.staging.earth.gov/admin/index.html
    webOrigins:
      - https://pre.staging.earth.gov
    protocol: openid-connect
    fullScopeAllowed: true
    standardFlowEnabled: true
    implicitFlowEnabled: false
    directAccessGrantsEnabled: false
    serviceAccountsEnabled: false
    protocolMappers:
      - name: groups
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          full.path: "false"
          introspection.token.claim: "true"
          userinfo.token.claim: "true"
          multivalued: "true"
          id.token.claim: "true"
          lightweight.claim: "false"
          access.token.claim: "true"
    defaultClientScopes:
      - acr
      - basic
      - email
      - groups
      - profile
      - roles
      - web-origins

roles:
  client:
    grafana:
      - name: GrafanaAdmin
        description: Has full instance-wide permissions to manage all organizations, users, and global settings.
      - name: Admin
        description: Manages an organization's settings, users, dashboards, and data sources within that specific organization.
      - name: Editor
        description: Can create, edit, and delete dashboards and data sources in an organization but cannot modify organization or user settings.
      - name: Viewer
        description: Can only view dashboards and panels without the ability to create or modify content.
      - name: No Basic Role
        description: Has no permissions
    stac:
      - name: Admin
        description: Can create, update and delete STAC collections and items
      - name: Editor
        description: Can create and update STAC collections and items
      - name: Viewer
        description: Can only view STAC collections and items
    ingest-api:
      - name: Admin
        description: Can create, update and delete STAC collections and items
      - name: Editor
        description: Can create and update STAC collections and items
      - name: No Basic Role
        description: Has no permissions
    ingest-ui:
      - name: Editor
        description: Can initiate and update dataset ingests
      - name: Limited Access
        description: Has limited access to the ingest UI features
    airflow-webserver-fab:
      - name: Admin
        description: Has all possible permissions, including granting or revoking permissions from other users
      - name: Public
        description: No permissions
      - name: Viewer
        description: Limited read permissions
      - name: User
        description: Viewer permissions plus additional permissions
      - name: Dag_Launcher
        description: Programmatic DAG runs
    earth-gov-cms:
      - name: earth-gov-cms-editors
        description: Allow editing content for earth.gov via CMS
      - name: earth-gov-cms-publishers
        description: Allow publishing content for earth.gov via CMS

clientScopeMappings:
  stac:
    - clientScope: stac:item:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:delete
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:delete
      roles:
        - Admin
  ingest-api:
    - clientScope: stac:item:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:item:delete
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:create
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:update
      roles:
        - Admin
        - Editor
    - clientScope: stac:collection:delete
      roles:
        - Admin
  ingest-ui:
    - clientScope: dataset:create
      roles:
        - Editor
    - clientScope: dataset:update
      roles:
        - Editor
    - clientScope: stac:collection:update
      roles:
        - Editor
    - clientScope: dataset:limited-access
      roles:
        - Limited Access

clientScopes:
  - name: stac:item:create
    description: Create STAC items
    protocol: openid-connect
  - name: stac:item:update
    description: Update STAC items
    protocol: openid-connect
  - name: stac:item:delete
    description: Delete STAC items
    protocol: openid-connect
  - name: stac:collection:create
    description: Create STAC collections
    protocol: openid-connect
  - name: stac:collection:update
    description: Update STAC collections
    protocol: openid-connect
  - name: stac:collection:delete
    description: Delete STAC collections
    protocol: openid-connect
  - name: dataset:create
    description: Ingest new datasets
    protocol: openid-connect
  - name: dataset:update
    description: Update existing datasets
    protocol: openid-connect
  - name: dataset:limited-access
    description: Limited access to the ingest UI features
    protocol: openid-connect

groups:
  - name: System Administrators
    clientRoles:
      grafana:
        - GrafanaAdmin
      stac:
        - Admin
      ingest-api:
        - Admin
      ingest-ui:
        - Editor
      airflow-webserver-fab:
        - Admin

  - name: Developers
    clientRoles:
      grafana:
        - Editor
      stac:
        - Admin
      ingest-api:
        - Admin
      ingest-ui:
        - Editor
      airflow-webserver-fab:
        - User

  - name: Data Editors
    clientRoles:
      grafana:
        - Viewer
      stac:
        - Editor
      ingest-api:
        - Editor
      ingest-ui:
        - Editor
      airflow-webserver-fab:
        - User

  - name: No Basic Role
    clientRoles:
      grafana:
        - No Basic Role
      stac:
        - Viewer
      ingest-api:
        - No Basic Role
      ingest-ui:
        - Limited Access
      airflow-webserver-fab:
        - Public

  - name: Tenants
    subGroups:
      - name: VEDA
        subGroups:
          - name: Admins
            clientRoles:
              grafana:
                - GrafanaAdmin
              stac:
                - Admin
              ingest-api:
                - Admin
          - name: Editors
            clientRoles:
              grafana:
                - Editor
              stac:
                - Editor
              ingest-api:
                - Editor
              ingest-ui:
                - Editor

      - name: Disasters
        subGroups:
          - name: Admins
            clientRoles:
              grafana:
                - GrafanaAdmin
              stac:
                - Admin
              ingest-api:
                - Admin
          - name: Editors
            clientRoles:
              grafana:
                - Editor
              stac:
                - Editor
              ingest-api:
                - Editor
              ingest-ui:
                - Editor

      - name: GHGC
        subGroups:
          - name: Admins
            clientRoles:
              grafana:
                - GrafanaAdmin
              stac:
                - Admin
              ingest-api:
                - Admin
          - name: Editors
            clientRoles:
              grafana:
                - Editor
              stac:
                - Editor
              ingest-api:
                - Editor
              ingest-ui:
                - Editor

  - name: Earth.gov CMS Editors
    clientRoles:
      earth-gov-cms:
        - earth-gov-cms-editors
    subGroups:
      - name: Earth.gov CMS Publishers
        clientRoles:
          earth-gov-cms:
            - earth-gov-cms-publishers

identityProviders:
  # CILogon
  - alias: cilogon # NOTE: this alias appears in the redirect_uri for the auth flow, update Github OAuth settings accordingly
    displayName: CILogon
    providerId: oidc
    enabled: true
    updateProfileFirstLoginMode: on
    trustEmail: false
    storeToken: false
    addReadTokenRoleOnCreate: false
    authenticateByDefault: false
    linkOnly: false
    config:
      userInfoUrl: "https://cilogon.org/oauth2/userinfo"
      validateSignature: "true"
      tokenUrl: "https://cilogon.org/oauth2/token"
      jwksUrl: "https://cilogon.org/oauth2/certs"
      issuer: "https://cilogon.org"
      useJwksUrl: "true"
      pkceEnabled: "false"
      defaultScope: "openid email profile"
      metadataDescriptorUrl: "https://cilogon.org/.well-known/openid-configuration"
      authorizationUrl: "https://cilogon.org/authorize"
      clientAuthMethod: "client_secret_post"
      syncMode: "IMPORT"
      clientId: $(env:CILOGON_CLIENT_ID)
      clientSecret: $(env:CILOGON_CLIENT_SECRET)
identityProviderMappers:
  - name: "email"
    identityProviderAlias: cilogon
    identityProviderMapper: oidc-user-attribute-idp-mapper
    config:
      syncMode: "IMPORT"
      claim: "email"
      user.attribute: "email"
  - name: "first name"
    identityProviderAlias: cilogon
    identityProviderMapper: oidc-user-attribute-idp-mapper
    config:
      syncMode: "IMPORT"
      claim: "profile.given_name"
      user.attribute: "firstName"
  - name: "last name"
    identityProviderAlias: cilogon
    identityProviderMapper: oidc-user-attribute-idp-mapper
    config:
      syncMode: "IMPORT"
      claim: "profile.family_name"
      user.attribute: "lastName"

# Login Flow Configuration
browserFlow: Browser without Password
authenticationFlows:
  - alias: Browser without Password
    description: browser based authentication without username password form
    providerId: basic-flow
    topLevel: true
    builtIn: false
    authenticationExecutions:
      - authenticator: auth-cookie
        authenticatorFlow: false
        requirement: ALTERNATIVE
        priority: 10
        autheticatorFlow: false
        userSetupAllowed: false
      - authenticator: auth-spnego
        authenticatorFlow: false
        requirement: DISABLED
        priority: 20
        autheticatorFlow: false
        userSetupAllowed: false
      - authenticatorFlow: true
        requirement: ALTERNATIVE
        priority: 30
        autheticatorFlow: true
        flowAlias: Browser without Password forms
        userSetupAllowed: false
  - alias: Browser without Password forms
    description: Username, password, otp and other auth forms.
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticatorConfig: cilogon
        authenticator: identity-provider-redirector
        authenticatorFlow: false
        requirement: REQUIRED
        priority: 20
        autheticatorFlow: false
        userSetupAllowed: false
      - authenticatorFlow: true
        requirement: CONDITIONAL
        priority: 21
        autheticatorFlow: true
        flowAlias: Browser without Password Browser - Conditional OTP
        userSetupAllowed: false
  - alias: Browser without Password Browser - Conditional OTP
    description: Flow to determine if the OTP is required for the authentication
    providerId: basic-flow
    topLevel: false
    builtIn: false
    authenticationExecutions:
      - authenticator: conditional-user-configured
        authenticatorFlow: false
        requirement: REQUIRED
        priority: 10
        autheticatorFlow: false
        userSetupAllowed: false
      - authenticator: auth-otp-form
        authenticatorFlow: false
        requirement: REQUIRED
        priority: 20
        autheticatorFlow: false
        userSetupAllowed: false
authenticatorConfig:
  - alias: cilogon
    config:
      defaultProvider: cilogon

users:
  - username: service-account-airflow-webserver-fab
    emailVerified: true
    enabled: true
    serviceAccountClientId: airflow-webserver-fab
    clientRoles:
      airflow-webserver-fab:
      - Dag_Launcher
  - username: service-account-airflow-stac-etl
    emailVerified: true
    enabled: true
    serviceAccountClientId: airflow-stac-etl
    clientRoles:
      stac:
      - Admin
  - username: service-account-airflow-ingest-api-etl
    emailVerified: true
    enabled: true
    serviceAccountClientId: airflow-ingest-api-etl
    clientRoles:
      ingest-api:
      - Admin

defaultGroups:
  - "/No Basic Role"